name: trailguard
description: TrailGuard - Offline Intelligent Hiker Safety System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # GPS & Location
  geolocator: ^11.0.0

  # Offline Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Local Database
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # Background Services
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^17.1.2

  # Charts & Visualization
  fl_chart: ^0.68.0

  # Permissions
  permission_handler: ^11.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  connectivity_plus: ^6.0.3

  # Math
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/maps/
